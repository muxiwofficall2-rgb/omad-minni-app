<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omad Tour - Visa & Travel</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f10;
    color: #fff;
}

/* TOP BAR */
.top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    border-bottom: 1px solid #222;
}

.logo {
    font-weight: bold;
    letter-spacing: 2px;
}

.lang button {
    background: #1c1c1e;
    color: white;
    border: 1px solid #333;
    padding: 5px 10px;
    margin-left: 5px;
    cursor: pointer;
    border-radius: 5px;
}

/* TITLE */
h1 {
    text-align: center;
    margin-top: 20px;
    font-size: 20px;
}

/* BUTTONS */
.grid {
    display: grid;
    gap: 12px;
    padding: 20px;
}

.card {
    background: #1a1a1d;
    padding: 15px;
    text-align: center;
    border-radius: 10px;
    border: 1px solid #2a2a2e;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    background: #2a2a2e;
}

/* SECTIONS */
.section {
    padding: 15px;
    margin: 10px;
    background: #151517;
    border-radius: 10px;
    border: 1px solid #2a2a2e;
}

a {
    color: white;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="top">
    <div class="logo">OMAD TOUR</div>
    <div class="lang">
        <button onclick="setLang('uz')">UZ</button>
        <button onclick="setLang('ru')">RU</button>
        <button onclick="setLang('en')">EN</button>
    </div>
</div>

<h1 id="title">AVIATSIYA & VISA XIZMATLAR</h1>

<div class="grid" id="buttons"></div>

<div class="section">
    <h3>CONTACTS</h3>
    <p id="c1"></p>
    <p id="c2"></p>
    <p id="c3"></p>
</div>

<div class="section">
    <h3>ADDRESS</h3>
    <p>ООО «ОмадТур», Санкт-Петербург</p>
    <p>Metro Technologicheskiy institut</p>
    <p>Metro Dybenko / Bolshhevikov</p>
</div>

<div class="section">
    <h3>PRICES</h3>
    <p>Kserokopiya: 35–100 RUB</p>
    <p>Foto: 250–400 RUB</p>
    <p>Anketa: 500–1000 RUB</p>
</div>

<script>
const data = {
 uz: {
  title: "AVIATSIYA & VISA XIZMATLAR",
  contacts: [
   "+7 981 193 90 94 (Aviabilet)",
   "+7 937 949 90 94 (Yordamchi)",
   "kopitsentr.omad@bk.ru"
  ],
  buttons: [
   ["Viza javobi","https://visa.mfa.uz/ruxsat/view"],
   ["Zagran pasport anketasi","#"],
   ["Vatanga qaytish","#"],
   ["Viza anketasi","#"],
   ["Telegram profil","https://t.me/AVIAKASSA9094"],
   ["Avia bilet narxlari","https://t.me/+uJn1nFmpzjoxMGEy"]
  ]
 },
 ru: {
  title: "ВИЗА И АВИАСЕРВИС",
  contacts: [
   "+7 981 193 90 94",
   "+7 937 949 90 94",
   "kopitsentr.omad@bk.ru"
  ],
  buttons: [
   ["Ответ по визе","https://visa.mfa.uz/ruxsat/view"],
   ["Анкета","#"],
   ["Возврат","#"],
   ["Telegram","https://t.me/AVIAKASSA9094"]
  ]
 },
 en: {
  title: "VISA & AVIATION SERVICES",
  contacts: [
   "+7 981 193 90 94",
   "+7 937 949 90 94",
   "kopitsentr.omad@bk.ru"
  ],
  buttons: [
   ["Visa result","https://visa.mfa.uz/ruxsat/view"],
   ["Forms","#"],
   ["Telegram","https://t.me/AVIAKASSA9094"]
  ]
 }
};

let lang = "uz";

function setLang(l){
 lang = l;
 render();
}

function render(){
 document.getElementById("title").innerText = data[lang].title;

 document.getElementById("c1").innerText = data[lang].contacts[0];
 document.getElementById("c2").innerText = data[lang].contacts[1];
 document.getElementById("c3").innerText = data[lang].contacts[2];

 let box = document.getElementById("buttons");
 box.innerHTML = "";

 data[lang].buttons.forEach(b=>{
  let a = document.createElement("a");
  a.href = b[1];
  a.target = "_blank";
  a.innerHTML = `<div class="card">${b[0]}</div>`;
  box.appendChild(a);
 });
}

render();
</script>

</body>
</html>

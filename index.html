<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omad Tour</title>

<style>
body{
  margin:0;
  font-family: Arial;
  color:white;
  background: linear-gradient(135deg,#020617,#0f172a,#020617);
  overflow-x:hidden;
}

/* 🌍 fon */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg");
  background-size:cover;
  opacity:0.07;
  z-index:-2;
}

/* ✈️ planes */
.plane{
  position:fixed;
  font-size:30px;
  animation: fly linear infinite;
  z-index:-1;
}

@keyframes fly{
  0%{ left:-10%; transform:translateY(0);}
  50%{ transform:translateY(-20px);}
  100%{ left:110%; transform:translateY(0);}
}

/* header */
.header{
  text-align:center;
  font-size:26px;
  margin:15px;
}

/* language */
.lang{
  text-align:center;
}
.lang button{
  margin:5px;
  padding:6px 12px;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:10px;
}

/* button */
.btn{
  background:#22c55e;
  padding:16px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover{transform:scale(1.05);}
.btn:active{transform:scale(0.95);}

.hidden{display:none;}

.back{
  margin:10px;
  cursor:pointer;
}

/* contact */
.contact{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

/* address */
.address{
  padding:15px;
  font-size:14px;
  line-height:1.5;
}
</style>
</head>

<script>

let lang="uz";

const t={
uz:{
visa:"Viza",
anketa:"Anketa",
contact:"Murojaat",
map:"Manzil",
back:"Orqaga", 
visa_check:"Vizani tekshirish",

group:"Konsul guruhi",

return:"Возвращение (полный)",

};

function setLang(l){

lang=l;

document.querySelectorAll("[data-lang]").forEach(el=>{

el.innerText=t[lang][el.dataset.lang];

});

}

function openPage(id){

document.getElementById("main").classList.add("hidden");

document.getElementById(id).classList.remove("hidden");

}

function back(){

document.getElementById("visa").classList.add("hidden");

document.getElementById("anketa").classList.add("hidden");

document.getElementById("contact").classList.add("hidden");

document.getElementById("map").classList.add("hidden");

document.getElementById("main").classList.remove("hidden");

}

setLang("uz");

</script>

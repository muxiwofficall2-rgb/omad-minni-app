<style>
body {
  margin:0;
  font-family: Arial;
  color:white;
  overflow-x:hidden;
  background: #020617;
}

/* 🌍 MAP BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg");
  background-size:cover;
  opacity:0.1;
  z-index:-2;
}

/* ✈ PLANES */
.plane{
  position:fixed;
  font-size:30px;
  animation: fly linear infinite;
  z-index:-1;
}

@keyframes fly{
  from{ left:-10%; }
  to{ left:110%; }
}

.header{
  text-align:center;
  font-size:24px;
  margin:10px;
}

.lang button{
  margin:5px;
  padding:6px 10px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.btn{
  background:#22c55e;
  padding:15px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.hidden{display:none;}

.back{
  margin:10px;
  cursor:pointer;
}

.contact{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.address{
  padding:15px;
  font-size:14px;
}
</style>
</head>

<script>

let lang="uz";

const t={
uz:{
visa:"Viza",
anketa:"Anketa",
contact:"Murojaat",
map:"Manzil",
back:"Orqaga",
visa_check:"Vizani tekshirish",
group:"Konsul guruhi",
passport_full:"Zagran pasport (to‘liq)",
return_full:"Vatanga qaytish (to‘liq)",
transit_full:"Tranzit viza (to‘liq)"
},
ru:{
visa:"Виза",
anketa:"Анкета",
contact:"Связь",
map:"Адрес",
back:"Назад",
visa_check:"Проверить визу",group:"Консульская группа",

passport_full:"Загран паспорт (полный)",

return_full:"Возвращение (полный)",

transit_full:"Транзитная виза (полный)"

}

};

function setLang(l){

lang=l;

document.querySelectorAll("[data-lang]").forEach(el=>{

el.innerText=t[lang][el.dataset.lang];

});

}

function openPage(id){

document.getElementById("main").classList.add("hidden");

document.getElementById(id).classList.remove("hidden");

}

function back(){

document.getElementById("main").classList.remove("hidden");

document.querySelectorAll(".hidden").forEach(el=>el.classList.add("hidden"));

}

setLang("uz");

</script>
